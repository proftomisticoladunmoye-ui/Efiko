# EFIKO — CI. Type-checks the ALWE engine, gates lessons on schema + size budget,
# and builds the PWA. No secrets needed (the lesson gate and typecheck are offline).
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Type-check ALWE engine
        run: npm run typecheck
      - name: Validate ALWE lessons (schema + <3MB budget)
        run: npm run alwe:smoke
      - name: Build PWA
        run: npm run build
