# Efiko — Render blueprint for the Gateway (the WhatsApp/SMS/AI server).
# Deploy: Render Dashboard → New → Blueprint → connect this repo.
# Secrets (sync: false) are entered in the Render dashboard, never committed.
services:
  - type: web
    name: efiko-gateway
    runtime: node
    plan: free            # upgrade to "starter" ($7/mo) for always-on (no cold starts)
    region: frankfurt     # closest to East Africa; or "oregon"/"singapore"
    buildCommand: npm install
    startCommand: npm run server
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # --- non-secret config (committed) ---
      - key: EFIKO_AUTHOR_MODEL
        value: claude-opus-4-8
      - key: EFIKO_FAST_MODEL
        value: claude-haiku-4-5
      - key: EFIKO_TTS_PROVIDER
        value: deepgram
      - key: EFIKO_TTS_VOICE
        value: aura-asteria-en
      - key: WHATSAPP_VERIFY_TOKEN
        value: Efiko-verify
      - key: WHATSAPP_GRAPH_URL
        value: https://graph.facebook.com/v19.0
      - key: SMS_PROVIDER
        value: mock
      # --- secrets: set these in the Render dashboard (do NOT commit) ---
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      # Institution Admin (Phase B) — set in the dashboard
      - key: ADMIN_SECRET
        sync: false
      - key: ADMIN_MASTER_KEY
        sync: false
      # First-admin bootstrap (optional) — auto-creates this institution on
      # startup so you can log in without running any terminal command.
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_ORG_ID
        sync: false
      - key: SEED_INSTITUTION
        sync: false
      # Persistence — Neon/Postgres connection string (durable accounts/branding/lessons)
      - key: DATABASE_URL
        sync: false
      # Set AFTER first deploy to the service's own URL, e.g.
      # https://efiko-gateway.onrender.com  (used for voice/whiteboard links)
      - key: PUBLIC_BASE_URL
        sync: false

  # --- Efiko PWA: the student web app (static site) ---
  - type: web
    name: efiko-pwa
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    envVars:
      # Point the web app at the gateway so AI/voice/snap work from the browser.
      - key: VITE_GATEWAY
        value: https://efiko-gateway.onrender.com
