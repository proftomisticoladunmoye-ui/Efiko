  <line x1="60" y1="220" x2="60" y2="30" stroke="#334155" stroke-width="2"/>
  <text x="250" y="250" font-size="13" fill="#334155" text-anchor="middle">Ability (theta)</text>
  <path d="M60 210 C 120 205, 150 60, 300 48" fill="none" stroke="#15803d" stroke-width="3"/>
  <path d="M60 216 C 200 212, 240 60, 400 46" fill="none" stroke="#0f766e" stroke-width="3"/>
